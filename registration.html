<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MZR TECH | Registration – Enroll Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fefaf8;
      color: #1e1e2f;
      line-height: 1.5;
      padding-bottom: 60px;
    }

    :root {
      --orange: #f97316;
      --red: #dc2626;
      --orange-light: #fff4ed;
      --border-glow: #ffd5bc;
      --shadow-card: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0,0,0,0.02);
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .register-header {
      background: white;
      border-bottom: 2px solid #f97316;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.96);
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }
    .logo {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #dc2626);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .back-link {
      color: #f97316;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-card {
      background: white;
      border-radius: 36px;
      padding: 32px 36px;
      margin: 36px 0;
      box-shadow: var(--shadow-card);
      border: 1px solid #ffe3d4;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.6s forwards;
    }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 5px solid #f97316;
      padding-left: 20px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      color: #2d2d3a;
      font-size: 0.9rem;
    }

    input, select {
      padding: 14px 16px;
      border-radius: 24px;
      border: 1.5px solid #f0dbcf;
      font-family: inherit;
      transition: 0.2s;
      background: white;
      font-size: 0.95rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }

    .radio-group {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .radio-group label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .courses-grid-reg {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      margin: 28px 0 32px;
    }
    .course-select-card {
      flex: 1;
      min-width: 240px;
      background: #ffffff;
      border-radius: 32px;
      padding: 24px;
      border: 2px solid #ffede3;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    .course-select-card.selected {
      border-color: #f97316;
      background: #fff9f5;
      box-shadow: 0 12px 20px -12px rgba(249,115,22,0.3);
      transform: translateY(-4px);
    }
    .course-name {
      font-size: 1.4rem;
      font-weight: 800;
    }
    .price-block {
      margin-top: 16px;
    }
    .discount-price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #dc2626;
    }
    .original-price {
      text-decoration: line-through;
      color: #9ca3af;
      margin-left: 10px;
      font-size: 0.9rem;
    }
    .course-badge {
      font-size: 0.7rem;
      background: #fee2e2;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 60px;
      margin-top: 12px;
    }

    .calculator {
      background: #0a0c12;
      color: white;
      border-radius: 32px;
      padding: 24px 28px;
      margin-top: 20px;
    }
    .calc-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2f3a;
    }
    .total {
      font-size: 1.6rem;
      font-weight: 800;
      color: #f97316;
    }
    .warning {
      color: #f97316;
      font-size: 0.8rem;
      margin-top: 12px;
      background: rgba(249,115,22,0.1);
      padding: 8px 12px;
      border-radius: 40px;
      display: inline-block;
    }

    .payment-methods {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .method-card {
      flex: 1;
      background: #fefaf8;
      border-radius: 24px;
      padding: 18px;
      border: 1px solid #ffded0;
      transition: 0.2s;
    }
    .method-card h4 {
      font-size: 1.3rem;
      margin-bottom: 12px;
    }
    .method-detail {
      font-family: monospace;
      font-size: 0.85rem;
      background: white;
      padding: 6px 12px;
      border-radius: 60px;
      display: inline-block;
      margin: 4px 0;
    }

    .upload-area {
      background: #fffaf5;
      border-radius: 28px;
      padding: 20px;
      margin: 20px 0;
      text-align: center;
      border: 1px dashed #f97316;
    }

    .btn-submit {
      background: linear-gradient(95deg, #f97316, #dc2626);
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      animation: pulseBtn 2s infinite;
      margin-top: 20px;
    }
    @keyframes pulseBtn {
      0% { transform: scale(1); box-shadow: 0 4px 12px rgba(249,115,22,0.3);}
      50% { transform: scale(1.02); box-shadow: 0 8px 22px rgba(220,38,38,0.5);}
      100% { transform: scale(1);}
    }
    .btn-submit:hover {
      transform: scale(1.01);
      animation: none;
    }

    .success-msg {
      background: #10b981;
      color: white;
      padding: 16px;
      border-radius: 48px;
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
    }
    
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      padding: 16px;
      border-radius: 48px;
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
      display: none;
    }

    @media (max-width: 780px) {
      .two-col {
        grid-template-columns: 1fr;
      }
      .section-card {
        padding: 24px;
      }
    }
    .disabled-warning {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px;
      border-radius: 60px;
      text-align: center;
      margin-bottom: 16px;
    }
    
    /* Already Submitted Message */
    .already-submitted {
      text-align: center;
      padding: 60px 40px;
      background: white;
      border-radius: 48px;
      margin: 40px 0;
    }
    .already-submitted h2 {
      color: #f97316;
      margin-bottom: 16px;
    }

    /* loading spinner for image conversion */
    .spinner-small {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="register-header">
  <div class="container">
    <div class="navbar">
      <div class="logo">MZR TECH ✦ Registration</div>
      <a href="index.html" class="back-link" id="homeLink">← Back to Home</a>
    </div>
  </div>
</div>

<div class="container" id="mainContainer">
  <div id="registrationContent"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
  // Initialize EmailJS with your Public Key
  (function() {
    emailjs.init("PyqTlXPUSAPVhlrAT");
  })();

  // Firebase configuration
  var firebaseConfig = {
    apiKey: "AIzaSyAdI-YJtTY_ZnSZlseBFJak_SATJvpPlQE",
    authDomain: "mzr-tech.firebaseapp.com",
    projectId: "mzr-tech",
    storageBucket: "mzr-tech.firebasestorage.app",
    messagingSenderId: "699579882604",
    appId: "1:699579882604:web:500dba17c03fbe1dec0c49",
    measurementId: "G-3DMHKJVD4P"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  // ---------- COURSE DATA ----------
  const coursesData = [
    { id: 'expert', name: '💻 Expert Computer Course', discounted: 3000, original: 4500, restrictedForNoKnowledge: true },
    { id: 'digital', name: '📈 Digital Marketing', discounted: 3500, original: 4500, restrictedForNoKnowledge: false },
    { id: 'web', name: '🌐 Web Development', discounted: 3500, original: 4500, restrictedForNoKnowledge: false }
  ];

  let selectedCourses = [];
  let coursesContainer, selectedCountSpan, courseTotalFeeSpan, grandTotalSpan;
  let limitWarningDiv, knowledgeWarningMsgDiv, radioKnowledge;
  const registrationFee = 500;
  
  // ✅ STEP 2: Helper function to convert file to Base64
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }
  
  // Check if student already submitted using localStorage
  function hasAlreadySubmitted() {
    const submitted = localStorage.getItem('mzr_registration_submitted');
    if (submitted === 'true') {
      return true;
    }
    return false;
  }
  
  // Show already submitted message
  function showAlreadySubmittedMessage() {
    const container = document.getElementById('registrationContent');
    container.innerHTML = `
      <div class="already-submitted">
        <div style="font-size: 4rem;">✅</div>
        <h2>You Have Already Registered!</h2>
        <p style="margin: 16px 0; color: #64748b;">Your registration has been submitted successfully.</p>
        <p style="margin-bottom: 24px;">Our team will verify your application and contact you within 24 hours.</p>
        <a href="index.html" class="btn-primary" style="text-decoration: none; display: inline-block; background: linear-gradient(95deg, #f97316, #dc2626); padding: 12px 28px; border-radius: 40px; color: white; font-weight: 700;">← Back to Home</a>
      </div>
    `;
  }
  
  function updateCalculator() {
    let totalCoursesFee = 0;
    selectedCourses.forEach(courseId => {
      const course = coursesData.find(c => c.id === courseId);
      if (course) totalCoursesFee += course.discounted;
    });
    const totalPayable = totalCoursesFee + registrationFee;
    if (selectedCountSpan) selectedCountSpan.innerText = selectedCourses.length;
    if (courseTotalFeeSpan) courseTotalFeeSpan.innerText = `Rs. ${totalCoursesFee.toLocaleString()}`;
    if (grandTotalSpan) grandTotalSpan.innerText = `Rs. ${totalPayable.toLocaleString()}`;
  }

  function renderCourses() {
    if (!coursesContainer) return;
    coursesContainer.innerHTML = '';
    coursesData.forEach(course => {
      const card = document.createElement('div');
      card.className = `course-select-card ${selectedCourses.includes(course.id) ? 'selected' : ''}`;
      card.setAttribute('data-id', course.id);
      card.innerHTML = `
        <div class="course-name">${course.name}</div>
        <div class="price-block">
          <span class="discount-price">Rs. ${course.discounted.toLocaleString()}</span>
          <span class="original-price">Rs. ${course.original.toLocaleString()}</span>
        </div>
        <div class="course-badge">📖 popular</div>
      `;
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleCourse(course.id);
      });
      coursesContainer.appendChild(card);
    });
  }

  function applyKnowledgeRestriction() {
    const selectedKnowledge = document.querySelector('input[name="knowledge"]:checked');
    const isNoKnowledge = selectedKnowledge && selectedKnowledge.value === 'No';
    if (isNoKnowledge) {
      if (knowledgeWarningMsgDiv) knowledgeWarningMsgDiv.style.display = 'block';
      selectedCourses = selectedCourses.filter(cid => cid === 'expert');
      updateCalculator();
      renderCourses();
    } else {
      if (knowledgeWarningMsgDiv) knowledgeWarningMsgDiv.style.display = 'none';
      renderCourses();
    }
    updateCalculator();
    renderCourses();
  }

  function toggleCourse(courseId) {
    const selectedKnowledge = document.querySelector('input[name="knowledge"]:checked');
    const isNoKnowledge = selectedKnowledge && selectedKnowledge.value === 'No';
    
    if (isNoKnowledge && courseId !== 'expert') {
      alert("❌ Due to 'No Knowledge' selection, you can only select Expert Computer Course.");
      return;
    }
    
    if (selectedCourses.includes(courseId)) {
      selectedCourses = selectedCourses.filter(id => id !== courseId);
    } else {
      if (selectedCourses.length >= 2) {
        if (limitWarningDiv) {
          limitWarningDiv.style.display = 'block';
          setTimeout(() => { if(limitWarningDiv) limitWarningDiv.style.display = 'none'; }, 2000);
        }
        return;
      }
      selectedCourses.push(courseId);
    }
    updateCalculator();
    renderCourses();
  }

  // ✅ UPDATED Submit function with Base64 image conversion
  async function submitRegistration(e) {
    e.preventDefault();
    
    const studentName = document.getElementById('studentName').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const email = document.getElementById('email').value;
    const fatherName = document.getElementById('fatherName').value;
    const education = document.getElementById('education').value;
    const systemRadio = document.querySelector('input[name="system"]:checked');
    const internetRadio = document.querySelector('input[name="internet"]:checked');
    const classTypeRadio = document.querySelector('input[name="classType"]:checked');
    const knowledgeRadio = document.querySelector('input[name="knowledge"]:checked');
    
    const totalText = document.getElementById('grandTotal').innerText;
    
    if (!studentName || !whatsapp) {
      alert("❌ Please fill Name and WhatsApp Contact.");
      return;
    }
    
    if (selectedCourses.length === 0) {
      alert("❌ Please select at least 1 course.");
      return;
    }
    
    const transactionId = document.getElementById('transactionId').value.trim();
    const screenshotFileInput = document.getElementById('paymentScreenshot');
    const screenshotFile = screenshotFileInput.files[0];
    
    if (!transactionId && !screenshotFile) {
      alert("⚠️ Please provide Transaction ID OR upload payment screenshot.");
      return;
    }
    
    // Check if already submitted
    if (hasAlreadySubmitted()) {
      alert("❌ You have already submitted a registration form. Multiple submissions are not allowed.");
      return;
    }
    
    // Disable button to prevent double submission & show processing state
    const submitBtn = document.getElementById('submitRegistrationBtn');
    const originalBtnText = submitBtn.innerText;
    submitBtn.disabled = true;
    submitBtn.innerText = '⏳ Processing image & submitting...';
    submitBtn.style.animation = 'none';
    
    try {
      // ✅ STEP 1 & STEP 2: Convert screenshot to Base64 if file exists
      let screenshotBase64 = "";
      if (screenshotFile) {
        // Show inline feedback
        submitBtn.innerHTML = '<span class="spinner-small"></span> Converting image to Base64...';
        screenshotBase64 = await toBase64(screenshotFile);
        // Optional: trim base64 to avoid huge payload if needed, but EmailJS can handle up to few MB.
      }
      
      // Prepare data for Firebase
      const registrationData = {
        studentName: studentName,
        fatherName: fatherName,
        whatsapp: whatsapp,
        email: email,
        education: education,
        computerKnowledge: knowledgeRadio ? knowledgeRadio.value : '',
        systemAvailability: systemRadio ? systemRadio.value : '',
        internetAccess: internetRadio ? internetRadio.value : '',
        classType: classTypeRadio ? classTypeRadio.value : '',
        selectedCourses: selectedCourses,
        courseNames: selectedCourses.map(id => coursesData.find(c => c.id === id)?.name),
        totalAmount: totalText,
        registrationFee: registrationFee,
        transactionId: transactionId,
        screenshotProvided: !!screenshotFile,
        screenshotBase64Stored: screenshotBase64 ? "(stored for email)" : "", // optional reference
        approved: false,
        status: 'pending',
        submittedAt: new Date(),
        createdAt: new Date()
      };
      
      // SAVE TO FIREBASE
      submitBtn.innerHTML = '<span class="spinner-small"></span> Saving to database...';
      await db.collection("students").add(registrationData);
      
      // Mark as submitted in localStorage
      localStorage.setItem('mzr_registration_submitted', 'true');
      localStorage.setItem('mzr_student_name', studentName);
      
      // ✅ STEP 1 — FIX EmailJS to send image: Build templateParams with screenshot (Base64)
      // Using the updated template params structure exactly as requested.
      const templateParams = {
        name: studentName,
        phone: whatsapp,
        email: email,
        course: selectedCourses.map(id => coursesData.find(c => c.id === id)?.name).join(", "),
        amount: totalText,
        transaction: transactionId || "Screenshot Uploaded",
        screenshot: screenshotBase64   // ✅ Now sending Base64 image (works with EmailJS)
      };
      
      // Send email using EmailJS with service ID: service_53jbhki, template ID: template_v9zo7jp
      submitBtn.innerHTML = '<span class="spinner-small"></span> Sending confirmation email...';
      emailjs.send("service_53jbhki", "template_v9zo7jp", templateParams)
        .then(function(response) {
          console.log("✅ Email Sent Successfully with screenshot!", response.status, response.text);
        }, function(error) {
          console.log("❌ Email Failed to Send (but registration saved):", error);
          // Don't block registration if email fails - we still show success
        });
      
      // Show success message
      const successDiv = document.getElementById('successMessage');
      successDiv.style.display = 'block';
      submitBtn.innerText = '✓ Submitted Successfully!';
      submitBtn.style.background = '#10b981';
      submitBtn.disabled = false; // allow seeing success, but will be replaced by already-submitted screen
      
      // Scroll to success message
      setTimeout(() => {
        successDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
      
      console.log("✅ Registration saved to Firebase with screenshot base64:", screenshotBase64 ? "Image included" : "No image");
      
      // Reset form after 3 seconds and show already submitted message
      setTimeout(() => {
        showAlreadySubmittedMessage();
      }, 3000);
      
    } catch (error) {
      console.error("❌ Firebase or Conversion Error:", error);
      alert("❌ Error saving data or processing image. Please check your connection and try again.");
      submitBtn.disabled = false;
      submitBtn.innerText = originalBtnText;
      submitBtn.style.background = 'linear-gradient(95deg, #f97316, #dc2626)';
      submitBtn.style.animation = 'pulseBtn 2s infinite';
    }
  }
  
  // Render the registration form
  function renderRegistrationForm() {
    const html = `
      <form id="registrationForm">
        <!-- STUDENT INFORMATION SECTION -->
        <div class="section-card" id="studentSection">
          <div class="section-title">🧑‍🎓 Student Details</div>

            <div class="form-group"><label>🌐 Internet Access</label>
              <div class="radio-group"><label><input type="radio" name="internet" value="Yes"> Yes</label><label><input type="radio" name="internet" value="No"> No</label></div>

          </div>
          <div class="form-group"><label>🏫 Class Type</label>

        <!-- COURSE SELECTION + CALCULATOR -->
        <div class="section-card" id="courseSection">

          <div class="calculator">
            <div class="calc-row"><span>📘 Selected Courses:</span><span id="selectedCount">0</span></div>

            <div class="calc-row"><span>📌 Registration Fee (one time):</span><span id="regFeeDisplay">Rs. 500</span></div>
            <div class="calc-row total"><span>💵 Total Payable:</span><span id="grandTotal">Rs. 500</span></div>
          </div>
        </div>

        <!-- PAYMENT & VERIFICATION SECTION -->
        <div class="section-card" id="paymentSection">
          <div class="section-title">💳 Payment & Verification</div>
          <div class="payment-methods">
            <div class="method-card"><h4>🟢 NayaPay</h4><div class="method-detail">Muhammad Zakriya Rehman</div><div class="method-detail">03249375759</div></div>

    document.getElementById('registrationContent').innerHTML = html;
    
    // Initialize DOM elements after rendering
    coursesContainer = document.getElementById('coursesContainer');
    selectedCountSpan = document.getElementById('selectedCount');
    courseTotalFeeSpan = document.getElementById('courseTotalFee');
    grandTotalSpan = document.getElementById('grandTotal');
    limitWarningDiv = document.getElementById('courseLimitWarning');
    knowledgeWarningMsgDiv = document.getElementById('knowledgeWarningMsg');
    radioKnowledge = document.querySelectorAll('input[name="knowledge"]');
    
    // Initialize functionality
    renderCourses();
    updateCalculator();
    
    // Set default values for radio groups
    if(!document.querySelector('input[name="knowledge"]:checked')) {
      const minRadio = document.querySelector('input[name="knowledge"][value="Minimum"]');
      if(minRadio) minRadio.checked = true;
      applyKnowledgeRestriction();
    }
    if(!document.querySelector('input[name="system"]:checked')) {
      const yesRadio = document.querySelector('input[name="system"][value="Yes"]');
      if(yesRadio) yesRadio.checked = true;
    }
    if(!document.querySelector('input[name="internet"]:checked')) {
      const yesRadio = document.querySelector('input[name="internet"][value="Yes"]');
      if(yesRadio) yesRadio.checked = true;
    }
    if(!document.querySelector('input[name="classType"]:checked')) {
      const bothRadio = document.querySelector('input[name="classType"][value="Both"]');
      if(bothRadio) bothRadio.checked = true;
    }
    
    // Add event listeners for knowledge radios
    radioKnowledge.forEach(radio => {
      radio.addEventListener('change', () => {
        applyKnowledgeRestriction();
        const isNo = document.querySelector('input[name="knowledge"]:checked')?.value === 'No';
        if (isNo) {
          selectedCourses = selectedCourses.filter(cid => cid === 'expert');
          updateCalculator();
          renderCourses();
        } else {
          renderCourses();
        }
        updateCalculator();
      });
    });
    
    // Form submit listener
    const form = document.getElementById('registrationForm');
    if (form) {
      form.addEventListener('submit', submitRegistration);
    }
  }
  
  // Check if already submitted and render appropriate content
  if (hasAlreadySubmitted()) {
    showAlreadySubmittedMessage();
  } else {
    renderRegistrationForm();
  }
